<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" fill="none">
  <style>
    text { font-family: 'Inter', 'SF Pro Text', system-ui, sans-serif; }
    .label { fill: #e8e8ec; font-size: 12px; font-weight: 600; }
    .sublabel { fill: #a0a0aa; font-size: 11px; font-weight: 400; }
    .tier-label { font-size: 12px; font-weight: 700; }
    .cap { font-size: 10px; font-weight: 400; }
    .yes { fill: #4ade80; }
    .no { fill: #ef4444; }
    .header { fill: #a0a0aa; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  </style>

  <rect width="640" height="360" fill="#111114" rx="8"/>
  <text x="320" y="28" text-anchor="middle" fill="#e8e8ec" font-size="14" font-weight="700">Trust Tier Capability Matrix</text>

  <!-- Column headers -->
  <text x="80" y="58" class="header">Tier</text>
  <text x="200" y="58" class="header">Read files</text>
  <text x="280" y="58" class="header">Write src</text>
  <text x="360" y="58" class="header">Write kernel</text>
  <text x="450" y="58" class="header">Governance</text>
  <text x="545" y="58" class="header">Boot agents</text>
  <line x1="30" y1="66" x2="610" y2="66" stroke="#333" stroke-width="0.5"/>

  <!-- T0 row -->
  <rect x="30" y="74" width="580" height="52" rx="4" fill="#0f1f16" stroke="#4ade80" stroke-width="0.5" stroke-opacity="0.5"/>
  <text x="42" y="96" class="tier-label" fill="#4ade80">T0</text>
  <text x="42" y="114" class="sublabel">Full governance</text>
  <text x="222" y="100" text-anchor="middle" class="cap yes">&#x2713;</text>
  <text x="302" y="100" text-anchor="middle" class="cap yes">&#x2713;</text>
  <text x="390" y="100" text-anchor="middle" class="cap yes">&#x2713;</text>
  <text x="476" y="100" text-anchor="middle" class="cap yes">&#x2713;</text>
  <text x="568" y="100" text-anchor="middle" class="cap yes">&#x2713;</text>

  <!-- T1 row -->
  <rect x="30" y="134" width="580" height="52" rx="4" fill="#0f1320" stroke="#60a5fa" stroke-width="0.5" stroke-opacity="0.5"/>
  <text x="42" y="156" class="tier-label" fill="#60a5fa">T1</text>
  <text x="42" y="174" class="sublabel">Write access</text>
  <text x="222" y="160" text-anchor="middle" class="cap yes">&#x2713;</text>
  <text x="302" y="160" text-anchor="middle" class="cap yes">&#x2713;</text>
  <text x="390" y="160" text-anchor="middle" class="cap no">&#x2717;</text>
  <text x="476" y="160" text-anchor="middle" class="cap no">&#x2717;</text>
  <text x="568" y="160" text-anchor="middle" class="cap yes">&#x2713;</text>

  <!-- T2 row -->
  <rect x="30" y="194" width="580" height="52" rx="4" fill="#1f1a0f" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.5"/>
  <text x="42" y="216" class="tier-label" fill="#f59e0b">T2</text>
  <text x="42" y="234" class="sublabel">Read-only</text>
  <text x="222" y="220" text-anchor="middle" class="cap yes">&#x2713;</text>
  <text x="302" y="220" text-anchor="middle" class="cap no">&#x2717;</text>
  <text x="390" y="220" text-anchor="middle" class="cap no">&#x2717;</text>
  <text x="476" y="220" text-anchor="middle" class="cap no">&#x2717;</text>
  <text x="568" y="220" text-anchor="middle" class="cap yes">&#x2713;</text>

  <!-- T3 row -->
  <rect x="30" y="254" width="580" height="52" rx="4" fill="#1a1a1e" stroke="#666" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="42" y="276" class="tier-label" fill="#666">T3</text>
  <text x="42" y="294" class="sublabel">Anonymous</text>
  <text x="222" y="280" text-anchor="middle" class="cap yes">&#x2713;</text>
  <text x="302" y="280" text-anchor="middle" class="cap no">&#x2717;</text>
  <text x="390" y="280" text-anchor="middle" class="cap no">&#x2717;</text>
  <text x="476" y="280" text-anchor="middle" class="cap no">&#x2717;</text>
  <text x="568" y="280" text-anchor="middle" class="cap no">&#x2717;</text>

  <!-- Footer note -->
  <text x="320" y="332" text-anchor="middle" class="sublabel">Tier is a floor. Explicit pin tokens (OSTK_PIN) can restrict further but never elevate.</text>
  <text x="320" y="348" text-anchor="middle" class="sublabel">Default: open (no pin = all writes allowed). With pin configured: fail-closed on error.</text>
</svg>
