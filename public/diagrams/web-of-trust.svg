<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" fill="none">
  <style>
    text { font-family: 'Inter', 'SF Pro Text', system-ui, sans-serif; }
    .label { fill: #e8e8ec; font-size: 13px; font-weight: 600; }
    .sublabel { fill: #a0a0aa; font-size: 11px; font-weight: 400; }
    .tier-label { font-size: 11px; font-weight: 700; }
    .sig-line { stroke-width: 1.5; }
    .sig-label { fill: #a0a0aa; font-size: 10px; font-weight: 400; }
  </style>

  <rect width="640" height="420" fill="#111114" rx="8"/>
  <text x="320" y="28" text-anchor="middle" fill="#e8e8ec" font-size="14" font-weight="700">GPG Web of Trust</text>

  <!-- T0 zone -->
  <rect x="60" y="45" width="460" height="90" rx="6" fill="#1a1a1e" stroke="#4ade80" stroke-width="1" stroke-opacity="0.4"/>
  <text x="70" y="62" class="tier-label" fill="#4ade80">T0 — Full Governance (trust anchors)</text>

  <!-- Root key -->
  <rect x="200" y="72" width="180" height="48" rx="4" fill="#0f1f16" stroke="#4ade80" stroke-width="1"/>
  <text x="290" y="92" text-anchor="middle" class="label">@ostk.ai root key</text>
  <text x="290" y="106" text-anchor="middle" class="sublabel">6C31...5413 (ed25519)</text>

  <!-- T0 Human -->
  <rect x="70" y="72" width="120" height="48" rx="4" fill="#0f1f16" stroke="#4ade80" stroke-width="1"/>
  <text x="130" y="92" text-anchor="middle" class="label">@scott (T0)</text>
  <text x="130" y="106" text-anchor="middle" class="sublabel">7141...3184</text>

  <!-- Cross-sig between T0 holders -->
  <line x1="190" y1="96" x2="200" y2="96" class="sig-line" stroke="#4ade80" stroke-dasharray="4,3"/>

  <!-- T1 zone -->
  <rect x="100" y="160" width="340" height="70" rx="6" fill="#1a1a1e" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.4"/>
  <text x="110" y="177" class="tier-label" fill="#60a5fa">T1 — Write Access (cross-signed by T0)</text>

  <!-- Kernel key -->
  <rect x="140" y="188" width="160" height="34" rx="4" fill="#0f1320" stroke="#60a5fa" stroke-width="1"/>
  <text x="220" y="206" text-anchor="middle" class="label">@haystack.prime</text>
  <text x="220" y="218" text-anchor="middle" class="sublabel">F033...69EB (kernel)</text>

  <!-- T1 contributor placeholder -->
  <rect x="320" y="188" width="100" height="34" rx="4" fill="#0f1320" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="370" y="206" text-anchor="middle" class="sublabel" fill="#60a5fa">your key</text>
  <text x="370" y="218" text-anchor="middle" class="sublabel" fill="#60a5fa">(cross-signed)</text>

  <!-- Cross-sig: @scott → kernel -->
  <line x1="130" y1="120" x2="200" y2="188" class="sig-line" stroke="#4ade80"/>
  <!-- Cross-sig: root → kernel -->
  <line x1="290" y1="120" x2="240" y2="188" class="sig-line" stroke="#4ade80"/>
  <text x="170" y="155" class="sig-label" fill="#4ade80">gpg --sign-key</text>

  <!-- Release signing — separate from trust tiers -->
  <rect x="470" y="72" width="155" height="80" rx="6" fill="#1a1a1e" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.4"/>
  <text x="480" y="89" class="tier-label" fill="#a78bfa">Release Signing</text>
  <rect x="482" y="98" width="130" height="44" rx="4" fill="#15102a" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="547" y="116" text-anchor="middle" class="label">CI key</text>
  <text x="547" y="130" text-anchor="middle" class="sublabel">6893...C46C (ed25519)</text>
  <!-- Root → CI cross-sig -->
  <line x1="380" y1="96" x2="482" y2="112" class="sig-line" stroke="#4ade80"/>
  <text x="425" y="90" class="sig-label" fill="#a78bfa">signs binaries</text>

  <!-- T2 zone -->
  <rect x="100" y="250" width="340" height="50" rx="6" fill="#1a1a1e" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
  <text x="110" y="267" class="tier-label" fill="#f59e0b">T2 — Read-Only (GPG present, not cross-signed)</text>
  <rect x="200" y="275" width="160" height="18" rx="3" fill="#1f1a0f" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="280" y="288" text-anchor="middle" class="sublabel" fill="#f59e0b">contributor (GPG on GitHub)</text>

  <!-- Escalation T2 → T1 -->
  <line x1="280" y1="250" x2="280" y2="230" class="sig-line" stroke="#f59e0b" stroke-dasharray="3,3"/>
  <text x="295" y="244" class="sig-label" fill="#f59e0b">get cross-signed</text>

  <!-- T3 zone -->
  <rect x="100" y="315" width="340" height="40" rx="6" fill="#1a1a1e" stroke="#666" stroke-width="1" stroke-opacity="0.3"/>
  <text x="110" y="332" class="tier-label" fill="#666">T3 — Anonymous (no GPG key)</text>
  <text x="280" y="345" text-anchor="middle" class="sublabel" fill="#666">public artifacts only — cannot boot</text>

  <!-- Escalation T3 → T2 -->
  <line x1="280" y1="315" x2="280" y2="300" class="sig-line" stroke="#666" stroke-dasharray="3,3"/>
  <text x="295" y="310" class="sig-label" fill="#666">generate GPG key</text>

  <!-- Legend -->
  <line x1="470" y1="170" x2="500" y2="170" stroke="#4ade80" stroke-width="1.5"/>
  <text x="508" y="174" class="sig-label" fill="#a0a0aa">cross-signature</text>
  <line x1="470" y1="188" x2="500" y2="188" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="508" y="192" class="sig-label" fill="#a0a0aa">escalation path</text>
</svg>
