<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 440" fill="none">
  <style>
    text { font-family: 'Inter', 'SF Pro Text', system-ui, sans-serif; }
    .label { fill: #e8e8ec; font-size: 13px; font-weight: 600; }
    .sublabel { fill: #a0a0aa; font-size: 11px; font-weight: 400; }
    .step-num { fill: #4ade80; font-size: 12px; font-weight: 700; }
    .deny { fill: #ef4444; font-size: 11px; font-weight: 600; }
  </style>

  <rect width="620" height="440" fill="#111114" rx="8"/>
  <text x="310" y="28" text-anchor="middle" fill="#e8e8ec" font-size="14" font-weight="700">The Write Path (str_replace_cas)</text>

  <!-- Agent -->
  <rect x="220" y="44" width="180" height="32" rx="4" fill="#1a1a1e" stroke="#60a5fa" stroke-width="1"/>
  <text x="310" y="64" text-anchor="middle" class="label">Agent calls file:edit</text>
  <line x1="310" y1="76" x2="310" y2="90" stroke="#3a3a42" stroke-width="1"/>
  <polygon points="306,88 314,88 310,94" fill="#3a3a42"/>

  <!-- Step 1: Pin check -->
  <rect x="120" y="94" width="380" height="40" rx="4" fill="#1a1a1e" stroke="#4ade80" stroke-width="1" stroke-opacity="0.5"/>
  <text x="140" y="114" class="step-num">1</text>
  <text x="160" y="114" class="label">Pin check</text>
  <text x="160" y="128" class="sublabel">trust tier + deny tokens + path match (policy.rs)</text>
  <text x="520" y="118" class="deny" text-anchor="end">silent block</text>
  <line x1="310" y1="134" x2="310" y2="146" stroke="#3a3a42" stroke-width="1"/>
  <polygon points="306,144 314,144 310,150" fill="#3a3a42"/>

  <!-- Step 2: flock -->
  <rect x="120" y="150" width="380" height="40" rx="4" fill="#1a1a1e" stroke="#4ade80" stroke-width="1" stroke-opacity="0.5"/>
  <text x="140" y="170" class="step-num">2</text>
  <text x="160" y="170" class="label">Exclusive flock</text>
  <text x="160" y="184" class="sublabel">lock_exclusive() — one writer at a time (fs2)</text>
  <line x1="310" y1="190" x2="310" y2="202" stroke="#3a3a42" stroke-width="1"/>
  <polygon points="306,200 314,200 310,206" fill="#3a3a42"/>

  <!-- Step 3: Read + CAS -->
  <rect x="120" y="206" width="380" height="40" rx="4" fill="#1a1a1e" stroke="#4ade80" stroke-width="1" stroke-opacity="0.5"/>
  <text x="140" y="226" class="step-num">3</text>
  <text x="160" y="226" class="label">Read + CAS check</text>
  <text x="160" y="240" class="sublabel">read under lock, old_str must match (file.rs)</text>
  <text x="520" y="232" class="deny" text-anchor="end">Hot PR</text>
  <line x1="310" y1="246" x2="310" y2="258" stroke="#3a3a42" stroke-width="1"/>
  <polygon points="306,256 314,256 310,262" fill="#3a3a42"/>

  <!-- Step 4: gen_table + shadow -->
  <rect x="120" y="262" width="380" height="40" rx="4" fill="#1a1a1e" stroke="#4ade80" stroke-width="1" stroke-opacity="0.5"/>
  <text x="140" y="282" class="step-num">4</text>
  <text x="160" y="282" class="label">gen_table + shadow</text>
  <text x="160" y="296" class="sublabel">generation++, writer, mtime; old content to .ostk/shadows/</text>
  <line x1="310" y1="302" x2="310" y2="314" stroke="#3a3a42" stroke-width="1"/>
  <polygon points="306,312 314,312 310,318" fill="#3a3a42"/>

  <!-- Step 5: Write + audit -->
  <rect x="120" y="318" width="380" height="40" rx="4" fill="#1a1a1e" stroke="#4ade80" stroke-width="1" stroke-opacity="0.5"/>
  <text x="140" y="338" class="step-num">5</text>
  <text x="160" y="338" class="label">Write in place + audit</text>
  <text x="160" y="352" class="sublabel">seek(0), write, truncate; audit.jsonl append</text>

  <!-- flock release -->
  <line x1="310" y1="358" x2="310" y2="374" stroke="#4ade80" stroke-width="1"/>
  <polygon points="306,372 314,372 310,378" fill="#4ade80"/>
  <text x="310" y="393" text-anchor="middle" class="label" fill="#4ade80">flock released on drop</text>

  <!-- Success -->
  <line x1="310" y1="398" x2="310" y2="412" stroke="#4ade80" stroke-width="1"/>
  <polygon points="306,410 314,410 310,416" fill="#4ade80"/>
  <text x="310" y="433" text-anchor="middle" class="label" fill="#4ade80">file written</text>

  <!-- Hot PR branch from step 3 -->
  <line x1="500" y1="232" x2="545" y2="232" stroke="#f59e0b" stroke-width="1"/>
  <rect x="515" y="244" width="100" height="72" rx="3" fill="#1f1a0f" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="565" y="258" text-anchor="middle" class="sublabel" fill="#f59e0b">Hot PR tiers:</text>
  <text x="565" y="272" text-anchor="middle" class="sublabel" fill="#f59e0b">Tier 1: auto-merge</text>
  <text x="565" y="286" text-anchor="middle" class="sublabel" fill="#f59e0b">Tier 2: assisted</text>
  <text x="565" y="300" text-anchor="middle" class="sublabel" fill="#f59e0b">Tier 3: rebase</text>
  <text x="565" y="314" text-anchor="middle" class="sublabel" fill="#f59e0b">Tier 4: diagnostic</text>
</svg>
