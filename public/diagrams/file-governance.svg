<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" fill="none">
  <style>
    text { font-family: 'Inter', 'SF Pro Text', system-ui, sans-serif; }
    .file-name { font-size: 15px; font-weight: 600; font-family: 'JetBrains Mono', 'SF Mono', monospace; }
    .file-desc { fill: #a0a0aa; font-size: 12px; font-weight: 400; }
    .badge { font-size: 10px; font-weight: 600; font-family: 'JetBrains Mono', 'SF Mono', monospace; letter-spacing: 0.05em; }
    .box { rx: 6; ry: 6; }
    .connector { stroke: #2a2a30; stroke-width: 1; stroke-dasharray: 4,3; }
  </style>

  <!-- OSfile -->
  <rect class="box" x="40" y="30" width="260" height="60" fill="#1a1a1e" stroke="#d4a054" stroke-width="1.5"/>
  <text class="file-name" x="60" y="58" fill="#d4a054">OSfile</text>
  <text class="file-desc" x="60" y="76">project identity -- signed, shared</text>
  <!-- badge: committed -->
  <rect x="460" y="42" width="90" height="22" rx="11" fill="#5a9a6a" fill-opacity="0.12" stroke="#5a9a6a" stroke-width="1" stroke-opacity="0.3"/>
  <text class="badge" x="505" y="57" text-anchor="middle" fill="#5a9a6a">COMMITTED</text>
  <!-- badge: shared -->
  <rect x="558" y="42" width="62" height="22" rx="11" fill="#5a8ab4" fill-opacity="0.12" stroke="#5a8ab4" stroke-width="1" stroke-opacity="0.3"/>
  <text class="badge" x="589" y="57" text-anchor="middle" fill="#5a8ab4">SHARED</text>
  <line x1="300" y1="54" x2="455" y2="54" class="connector"/>

  <!-- HUMANFILE -->
  <rect class="box" x="40" y="120" width="260" height="60" fill="#1a1a1e" stroke="#a0a0aa" stroke-width="1"/>
  <text class="file-name" x="60" y="148" fill="#e8e8ec">HUMANFILE</text>
  <text class="file-desc" x="60" y="166">operator identity -- preferences, tack dialect</text>
  <!-- badge: local -->
  <rect x="474" y="132" width="62" height="22" rx="11" fill="#c4944a" fill-opacity="0.12" stroke="#c4944a" stroke-width="1" stroke-opacity="0.3"/>
  <text class="badge" x="505" y="147" text-anchor="middle" fill="#c4944a">LOCAL</text>
  <!-- badge: private -->
  <rect x="544" y="132" width="72" height="22" rx="11" fill="#b85450" fill-opacity="0.12" stroke="#b85450" stroke-width="1" stroke-opacity="0.3"/>
  <text class="badge" x="580" y="147" text-anchor="middle" fill="#b85450">PRIVATE</text>
  <line x1="300" y1="144" x2="469" y2="144" class="connector"/>

  <!-- Agentfile -->
  <rect class="box" x="40" y="210" width="260" height="60" fill="#1a1a1e" stroke="#a0a0aa" stroke-width="1"/>
  <text class="file-name" x="60" y="238" fill="#e8e8ec">Agentfile</text>
  <text class="file-desc" x="60" y="256">agent process descriptor -- FROM, BOOT, TOOL</text>
  <!-- badge: committed -->
  <rect x="460" y="222" width="90" height="22" rx="11" fill="#5a9a6a" fill-opacity="0.12" stroke="#5a9a6a" stroke-width="1" stroke-opacity="0.3"/>
  <text class="badge" x="505" y="237" text-anchor="middle" fill="#5a9a6a">COMMITTED</text>
  <!-- badge: reviewable -->
  <rect x="558" y="222" width="62" height="22" rx="11" fill="#5a8ab4" fill-opacity="0.12" stroke="#5a8ab4" stroke-width="1" stroke-opacity="0.3"/>
  <text class="badge" x="589" y="237" text-anchor="middle" fill="#5a8ab4">REVIEW</text>
  <line x1="300" y1="234" x2="455" y2="234" class="connector"/>

  <!-- ENTITYFILE -->
  <rect class="box" x="40" y="300" width="260" height="60" fill="#1a1a1e" stroke="#d4a054" stroke-width="1" stroke-opacity="0.6"/>
  <text class="file-name" x="60" y="328" fill="#e8e8ec">ENTITYFILE</text>
  <text class="file-desc" x="60" y="346">instance governance -- trust tiers, attestation</text>
  <!-- badge: committed -->
  <rect x="460" y="312" width="90" height="22" rx="11" fill="#5a9a6a" fill-opacity="0.12" stroke="#5a9a6a" stroke-width="1" stroke-opacity="0.3"/>
  <text class="badge" x="505" y="327" text-anchor="middle" fill="#5a9a6a">COMMITTED</text>
  <!-- badge: signed -->
  <rect x="558" y="312" width="62" height="22" rx="11" fill="#d4a054" fill-opacity="0.12" stroke="#d4a054" stroke-width="1" stroke-opacity="0.3"/>
  <text class="badge" x="589" y="327" text-anchor="middle" fill="#d4a054">SIGNED</text>
  <line x1="300" y1="324" x2="455" y2="324" class="connector"/>
</svg>
